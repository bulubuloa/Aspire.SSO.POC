# Runs on the VPS. Images are built by CI and pulled from ghcr.io — the box never compiles
# anything, because `dotnet build` on 1GB RAM will OOM.
#
#   ./deploy-vps.sh setup    (once)
#   ./deploy-vps.sh update   (or CI does it on every push to main)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./demo:/srv/demo:ro          # the Expo web export
      - caddy_data:/data             # certs — MUST persist or you'll hit LE rate limits
      - caddy_config:/config
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env}
    depends_on: [client, aspire]

  client:
    image: ghcr.io/${GH_OWNER:?}/aspire-sso-poc-client:${TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 8080
      # Only 1 core — Server GC pre-allocates per-core heaps for no benefit here.
      DOTNET_gcServer: "0"
      Client__Aspire__SsoEndpoint: "https://aspire.aspireservice.online/sso/jwt"
      Client__Aspire__ClientSecret: ${CLIENT_SECRET:?set CLIENT_SECRET in .env}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8080/api/rewards"]
      interval: 30s
      timeout: 5s
      retries: 3

  aspire:
    image: ghcr.io/${GH_OWNER:?}/aspire-sso-poc-aspire:${TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 8080
      DOTNET_gcServer: "0"
      Aspire__RegisteredClients__0__JwksUrl: "https://client.aspireservice.online/.well-known/jwks.json"
      Aspire__RegisteredClients__0__ClientSecret: ${CLIENT_SECRET:?}    # must match the client's
      Aspire__RegisteredClients__0__ReturnUrl: "democlient://redeemed"
    healthcheck:
      # 401 without a session IS healthy — the endpoint answering is the signal.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/session | grep -q 401"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
