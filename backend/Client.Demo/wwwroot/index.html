<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Demo Client — SSO Redeem (no-build)</title>
<!--
  A single-file version of the Demo Client app. No npm, no Expo, no build step:
  just open this file in a browser. It talks to the SAME Client.Demo backend the
  Expo app does (default http://localhost:5001), so the redeem/SSO flow is identical.

  Backend must be running (Rider or `dotnet run` in backend/Client.Demo + backend/Aspire.Sso).
  CORS on the backend is AllowAnyOrigin, so opening this from file:// works.
-->
<style>
  :root{
    --brand:#2563eb; --brand-dark:#1d4ed8; --ink:#0f172a; --muted:#64748b;
    --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --ok:#08845f; --okbg:#cef2e7; --danger:#dc2626;
    --radius:16px; --radius-sm:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--card);
          border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
  .brand b{color:var(--brand);font-size:18px;letter-spacing:.5px}
  .brand span{display:block;font-size:10px;color:var(--muted);letter-spacing:2px;font-weight:700}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;
          font-weight:700;font-size:14px;cursor:pointer}
  .content{padding:18px;flex:1}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  h1{font-size:20px;margin:0 0 4px} h2{font-size:15px;margin:0 0 12px;color:var(--ink)}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;margin:12px 0 5px}
  input,select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
               font-size:15px;background:#fff;color:var(--ink)}
  .btn{width:100%;padding:13px;border:0;border-radius:var(--radius-sm);background:var(--brand);color:#fff;
       font-weight:700;font-size:15px;cursor:pointer;margin-top:16px;transition:background .15s}
  .btn:hover{background:var(--brand-dark)} .btn:disabled{opacity:.6;cursor:default}
  .btn-sm{width:auto;padding:8px 16px;margin:0;font-size:13px}
  .btn-ghost{background:#eef2ff;color:var(--brand)}
  .muted{color:var(--muted);font-size:13px}
  .err{background:#fee2e2;color:var(--danger);border:1px solid #fecaca;border-radius:var(--radius-sm);
       padding:10px 12px;font-size:13px;margin-top:12px;display:none}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
  /* profile */
  .profile{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .profile .avatar{width:48px;height:48px;font-size:17px;cursor:default}
  .kvgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .kv{background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
  .kv b{display:block;font-size:10px;color:var(--muted);letter-spacing:.6px;margin-bottom:2px}
  .kv span{font-size:14px;font-weight:600}
  /* switches */
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:70px;padding:9px 10px;border:1px solid var(--border);background:#fff;border-radius:var(--radius-sm);
              font-size:13px;font-weight:600;cursor:pointer;color:var(--muted)}
  .seg button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .modeNote{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5}
  /* rewards */
  .reward{display:flex;align-items:center;gap:13px;padding:13px 0;border-top:1px solid var(--border)}
  .reward:first-child{border-top:0}
  .rico{width:44px;height:44px;border-radius:var(--radius-sm);background:#eff6ff;display:grid;place-items:center;
        font-size:22px;flex:none}
  .reward .info{flex:1;min-width:0}
  .reward .info b{font-size:14px} .reward .info div{font-size:12px;color:var(--muted);margin-top:2px}
  /* overlay */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:20;padding:16px}
  .overlay.show{display:flex}
  .sheet{width:100%;max-width:460px;height:88vh;background:#fff;border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .sheetbar{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:#f8fafc}
  .sheetbar .url{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .sheetbar .x{border:0;background:#e2e8f0;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--ink)}
  iframe{border:0;width:100%;flex:1}
  .cfg{font-size:11px;color:var(--muted);text-align:center;padding:10px}
  .cfg input{display:inline;width:auto;padding:4px 8px;font-size:11px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><b>Demo Client</b><span>MEMBER APP</span></div>
    <div id="avatar" class="avatar" style="display:none"></div>
  </div>
  <div class="content" id="view"></div>
  <div class="cfg">
    Backend: <input id="backend" spellcheck="false"> <button class="btn btn-sm btn-ghost" id="saveBackend" style="margin-top:0">save</button>
  </div>
</div>

<!-- SSO handoff opens here as an embedded in-app browser (used over HTTPS, like the Expo app). -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheetbar">
      <span class="url">🔒 <span id="sheetUrl">aspire</span></span>
      <button class="x" id="closeSheet" title="Close">✕</button>
    </div>
    <iframe id="frame" title="Aspire SSO"></iframe>
  </div>
</div>

<script>
"use strict";
// ---- config ----------------------------------------------------------------
const LS = "demoClientBackend";
// Served from the Client.Demo backend (http://localhost:5001/) → use its own origin, which keeps
// the SSO handoff same-site so the session cookie survives. Opened as a bare file:// → fall back
// to localhost:5001 (works for login, but SAML/JWT cookies may be blocked as third-party).
const sameOrigin = location.protocol.startsWith("http") ? location.origin : "http://localhost:5001";
let BACKEND = localStorage.getItem(LS) || sameOrigin;
document.getElementById("backend").value = BACKEND;
document.getElementById("saveBackend").onclick = () => {
  BACKEND = document.getElementById("backend").value.replace(/\/+$/, "");
  localStorage.setItem(LS, BACKEND);
  alert("Backend set to " + BACKEND);
};

// ---- tiny api --------------------------------------------------------------
async function api(path, opts) {
  const res = await fetch(BACKEND + path, opts);
  let data = null; try { data = await res.json(); } catch (_) {}
  if (!res.ok) throw new Error((data && data.error) || ("HTTP " + res.status));
  return data;
}
const login  = (username, password) => api("/api/login",  {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password})});
const getRewards = () => api("/api/rewards");
const redeem = (username, rewardId, mode, scenario) => api("/api/redeem", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,rewardId,mode:mode||"jwt",scenario:scenario||null})});

// fontawesome name -> emoji (so we need no icon library)
const ICONS = {"plane-departure":"✈️","utensils":"🍽️","spa":"💆","mug-saucer":"☕","film":"🎬",
  "heart-pulse":"❤️","car-side":"🚗","gas-pump":"⛽","dumbbell":"🏋️","hotel":"🏨","golf-ball-tee":"⛳","book-open":"📖"};
const icon = n => ICONS[n] || "🎁";

// ---- state -----------------------------------------------------------------
let user = null, rewards = [], mode = "jwt", scenario = "";
const view = document.getElementById("view");
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ---- screens ---------------------------------------------------------------
function renderLogin() {
  document.getElementById("avatar").style.display = "none";
  view.innerHTML = `
    <div class="card">
      <h1>Sign in</h1>
      <div class="muted">Your account with us. We never share your password.</div>
      <label>USERNAME</label><input id="u" placeholder="jane / arjun / mai" value="jane" autocomplete="username">
      <label>PASSWORD</label><input id="p" type="password" placeholder="demo" value="demo" autocomplete="current-password">
      <button class="btn" id="signin">SIGN IN</button>
      <div class="err" id="err"></div>
      <div class="hint">Demo users: jane · arjun · mai — password "demo"</div>
    </div>`;
  document.getElementById("signin").onclick = doLogin;
  view.querySelectorAll("input").forEach(i => i.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); }));
}

async function doLogin() {
  const btn = document.getElementById("signin"), err = document.getElementById("err");
  err.style.display = "none"; btn.disabled = true; btn.textContent = "Signing in…";
  try {
    user = await login(document.getElementById("u").value.trim(), document.getElementById("p").value);
    rewards = await getRewards();
    renderHome();
  } catch (e) {
    err.textContent = e.message; err.style.display = "block";
  } finally { btn.disabled = false; btn.textContent = "SIGN IN"; }
}

function initials(name){ return (name||"?").split(" ").map(s=>s[0]).join("").slice(0,2).toUpperCase(); }

const MODE_NOTES = {
  jwt:  "JWT — signed server-side and POSTed to Aspire back-channel. The token never reaches this app.",
  saml: "SAML 2.0 — the client's IdP signs an assertion your browser POSTs to Aspire (HTTP-POST binding)."
};
const SCENARIOS = [["","Happy"],["expired","Expired"],["wrong-aud","Wrong aud"],["tampered","Tampered"],["bad-secret","Bad secret"]];

function renderHome() {
  const av = document.getElementById("avatar");
  av.style.display = "grid"; av.textContent = initials(user.displayName);
  av.onclick = () => { user = null; renderLogin(); };

  view.innerHTML = `
    <div class="card">
      <div class="profile">
        <div class="avatar">${esc(initials(user.displayName))}</div>
        <div><div style="font-weight:700">${esc(user.displayName)}</div>
             <div class="muted">${esc(user.email)}</div></div>
      </div>
      <div class="kvgrid">
        <div class="kv"><b>MEMBER</b><span>${esc(user.sub)}</span></div>
        <div class="kv"><b>PROGRAM</b><span>${esc(user.program)}</span></div>
        <div class="kv"><b>COUNTRY</b><span>${esc(user.country)}</span></div>
        <div class="kv"><b>STATUS</b><span>${user.active ? "Active" : "Inactive"}</span></div>
      </div>
    </div>

    <div class="card">
      <h2>SSO mode</h2>
      <div class="seg" id="modeSeg">
        <button data-m="jwt">JWT</button><button data-m="saml">SAML 2.0</button>
      </div>
      <label style="margin-top:14px">SCENARIO (demo)</label>
      <div class="seg" id="scnSeg">${SCENARIOS.map(([v,l])=>`<button data-s="${v}">${l}</button>`).join("")}</div>
      <div class="modeNote" id="modeNote"></div>
    </div>

    <div class="card">
      <h2>Rewards</h2>
      <div id="rewardList"></div>
    </div>`;

  view.querySelector("#rewardList").innerHTML = rewards.map(r => `
    <div class="reward">
      <div class="rico">${icon(r.icon)}</div>
      <div class="info"><b>${esc(r.title)}</b><div>${r.points} pts · ${esc(r.detail || "")}</div></div>
      <button class="btn btn-sm" data-id="${esc(r.id)}">REDEEM</button>
    </div>`).join("");

  const paint = () => {
    view.querySelectorAll("#modeSeg button").forEach(b => b.classList.toggle("on", b.dataset.m === mode));
    view.querySelectorAll("#scnSeg button").forEach(b => b.classList.toggle("on", b.dataset.s === scenario));
    view.querySelector("#modeNote").textContent = MODE_NOTES[mode];
  };
  view.querySelectorAll("#modeSeg button").forEach(b => b.onclick = () => { mode = b.dataset.m; paint(); });
  view.querySelectorAll("#scnSeg button").forEach(b => b.onclick = () => { scenario = b.dataset.s; paint(); });
  view.querySelectorAll("#rewardList button").forEach(b => b.onclick = () => doRedeem(b));
  paint();
}

async function doRedeem(btn) {
  const id = btn.dataset.id, label = btn.textContent;
  // The Aspire session cookie only survives inside an iframe over HTTPS (SameSite=None;Secure).
  // So: HTTPS → embed the handoff like the Expo app; plain HTTP → open a top-level tab instead,
  // where the cookie is first-party and works. Same file, works great either way.
  const embed = location.protocol === "https:";
  let w = null;
  if (!embed) {  // open the tab synchronously (inside the click) so popup blockers allow it
    w = window.open("", "_blank");
    if (w) w.document.write("<p style='font-family:system-ui;padding:28px;color:#334155'>Signing you in…</p>");
  }
  btn.disabled = true; btn.textContent = "…";
  try {
    const { launchUrl, via } = await redeem(user.username, id, mode, scenario);
    const href = new URL(launchUrl, BACKEND).href;
    if (embed) openSheet(href, via || mode.toUpperCase());
    else if (w) w.location = href; else window.location = href;   // fallback if the popup was blocked
  } catch (e) {
    if (w) w.close();
    alert("Redeem failed: " + e.message);   // e.g. inactive user, tampered token, wrong aud
  } finally { btn.disabled = false; btn.textContent = label; }
}

// ---- embedded in-app browser overlay (HTTPS only) --------------------------
const overlay = document.getElementById("overlay");
function openSheet(url, via) {
  document.getElementById("sheetUrl").textContent = new URL(url, BACKEND).host + "  ·  VIA " + via;
  document.getElementById("frame").src = url;
  overlay.classList.add("show");
}
function closeSheet() { overlay.classList.remove("show"); document.getElementById("frame").src = "about:blank"; }
document.getElementById("closeSheet").onclick = closeSheet;
overlay.addEventListener("click", e => { if (e.target === overlay) closeSheet(); });

// The embedded Aspire page has no way to close its own iframe, so its "CLOSE AND RETURN TO THE APP"
// button posts this message up to us — that's what actually dismisses the overlay.
window.addEventListener("message", e => {
  if (e && e.data && e.data.type === "aspire:redeemed") { closeSheet(); toast("Redeemed ✓"); }
});
function toast(text) {
  const t = document.createElement("div");
  t.textContent = text;
  t.style.cssText = "position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);" +
    "color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.25)";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// go
renderLogin();
</script>
</body>
</html>
