# Render Blueprint — three services, free tier.
#
#   client   Client.Demo   (the client's system: auth, rewards, signs the JWT)
#   aspire   Aspire.Sso    (our SSO: validates, sessions, reward page)
#   demo     Expo web export (static)
#
# Deploy:  ./deploy.sh   (or push this repo and hit "New Blueprint" on Render)
#
# The two services must know each other's public URLs, so every URL below is an env var.
# After the first deploy — once Render has assigned hostnames or you've attached your domain —
# set the four *_URL values in the dashboard (or via deploy.sh) and redeploy.
services:
  # ── Aspire's SSO ───────────────────────────────────────────────────────────
  - type: web
    name: aspire
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend/Aspire.Sso
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/session      # returns 401 without a session — that is a healthy 'up'
    envVars:
      # Where to fetch the client's PUBLIC signing keys. Must be the client's public URL.
      - key: Aspire__RegisteredClients__0__JwksUrl
        sync: false
      # Deep link back into the client's app when the customer closes the reward page.
      - key: Aspire__RegisteredClients__0__ReturnUrl
        value: democlient://redeemed
      # Secret — set in the dashboard, never committed.
      - key: Aspire__RegisteredClients__0__ClientSecret
        sync: false

  # ── The client's system ────────────────────────────────────────────────────
  - type: web
    name: client
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend/Client.Demo
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/rewards
    envVars:
      # Where we POST the signed token. Must be Aspire's public URL.
      - key: Client__Aspire__SsoEndpoint
        sync: false
      # The secret Aspire issued us. Must match Aspire's copy.
      - key: Client__Aspire__ClientSecret
        sync: false

  # ── The Expo web build ─────────────────────────────────────────────────────
  - type: web
    name: demo
    runtime: static
    rootDir: mobile
    buildCommand: npm ci && npx expo export --platform web --output-dir dist
    staticPublishPath: ./dist
    envVars:
      # Baked in at build time — the app only ever talks to the client.
      - key: EXPO_PUBLIC_BACKEND_URL
        sync: false
    routes:
      # Expo web is a single-page app; every path must serve index.html.
      - type: rewrite
        source: /*
        destination: /index.html
